name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: focusmate-v2-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE: ccr.ccs.tencentyun.com/jo-bo/focusmate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: |
          pnpm --filter @focusmate/shared build
          pnpm --filter @focusmate/web build

      - name: Login Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Build and push server image
        run: |
          TAG=${GITHUB_SHA::8}
          docker build \
            --platform linux/amd64 \
            --build-arg NODE_IMAGE=docker.m.daocloud.io/library/node:22-alpine \
            -t "$IMAGE:$TAG" \
            -t "$IMAGE:prod" \
            .
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:prod"

      - name: Upload web assets
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 115.159.47.86
          username: ubuntu
          key: ${{ secrets.FOCUSMATE_DEPLOY_SSH_KEY }}
          source: apps/web/dist/*
          target: /tmp/focusmate-v2-web
          strip_components: 3
          rm: true

      - name: Deploy to voice.jobo.asia
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 115.159.47.86
          username: ubuntu
          key: ${{ secrets.FOCUSMATE_DEPLOY_SSH_KEY }}
          script_stop: true
          script: sudo /usr/local/bin/deploy-focusmate-v2
