name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: focusmate-v2-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to voice.jobo.asia
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 115.159.47.86
          username: ubuntu
          key: ${{ secrets.FOCUSMATE_DEPLOY_SSH_KEY }}
          script_stop: true
          script: sudo /usr/local/bin/deploy-focusmate-v2
